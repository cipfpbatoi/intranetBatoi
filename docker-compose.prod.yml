services:
    laravel.prod:

        restart: unless-stopped
        
        image: arturocandela/intranet:${IMAGE_TAG_PROD:-laravel12-prod}
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        expose:
            - "80"
        
        environment:
            WWWUSER: "${WWWUSER:-${UID:-1000}}"
            WWWGROUP: "${WWWGROUP:-${GID:-1000}}"
            LARAVEL_SAIL: 1
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - './.env:/var/www/html/.env'
            - selenium-downloads:/srv/documentsfct
            - '/var/www/html/intranetBatoi/storage:/var/www/html/storage'
        networks:
            - sail
        
        depends_on:
            - selenium
    caddy:

        restart: unless-stopped

        image: caddy:2-alpine
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - laravel.prod
        networks:
            - sail
    
    selenium:
        restart: unless-stopped
        image: selenium/standalone-firefox:latest
        ports:
            - '${FORWARD_SELENIUM_PORT:-4444}:4444'
            - '127.0.0.1:${FORWARD_SELENIUM_VNC_PORT:-7900}:7900'
        shm_size: '2gb'
        networks:
            - sail
        volumes:
          - selenium-downloads:/home/seluser/Downloads
        command: ["sh", "-lc", "chmod 0777 /home/seluser/Downloads && /opt/bin/entry_point.sh"]
    
networks:
    sail:
        driver: bridge
volumes:
    caddy_data:
    caddy_config:
    selenium-downloads:
        driver: local

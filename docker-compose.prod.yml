services:
    laravel.prod:
        restart: unless-stopped
        image: arturocandela/intranet:${IMAGE_TAG_PROD:-latest-prod}
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        expose:
            - "80"
        environment:
            WWWUSER: "${WWWUSER:-${UID:-1000}}"
            WWWGROUP: "${WWWGROUP:-${GID:-1000}}"
            LARAVEL_SAIL: 1
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - './.env:/var/www/html/.env'
            - selenium-downloads:/srv/documentsfct
            - '/var/www/html/intranetBatoi/storage:/var/www/html/storage'
        networks:
            - sail
        depends_on:
            - selenium
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        labels:
            - "com.centurylinklabs.watchtower.enable=true"

    caddy:
        restart: unless-stopped
        image: caddy:2-alpine
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - laravel.prod
        networks:
            - sail

    selenium:
        restart: unless-stopped
        image: selenium/standalone-firefox:latest
        ports:
            - '${FORWARD_SELENIUM_PORT:-4444}:4444'
            - '127.0.0.1:${FORWARD_SELENIUM_VNC_PORT:-7900}:7900'
        shm_size: '2gb'
        networks:
            - sail
        volumes:
            - selenium-downloads:/home/seluser/Downloads
        command: ["sh", "-lc", "chmod 0777 /home/seluser/Downloads && /opt/bin/entry_point.sh"]

    watchtower:
        restart: unless-stopped
        image: containrrr/watchtower:latest
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            WATCHTOWER_POLL_INTERVAL: "${WATCHTOWER_POLL_INTERVAL:-300}"
            WATCHTOWER_CLEANUP: "true"
            WATCHTOWER_LABEL_ENABLE: "true"
            WATCHTOWER_INCLUDE_RESTARTING: "true"
            REPO_USER: "${DOCKERHUB_USERNAME:-}"
            REPO_PASS: "${DOCKERHUB_TOKEN:-}"
        networks:
            - sail

networks:
    sail:
        driver: bridge
volumes:
    caddy_data:
    caddy_config:
    selenium-downloads:
        driver: local

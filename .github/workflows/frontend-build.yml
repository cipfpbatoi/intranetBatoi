name: Frontend Build

on:
  pull_request:
    branches:
      - Laravel12
      - master
  push:
    branches:
      - Laravel12

jobs:
  build-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: npm install

      - name: Build assets (dev)
        run: npm run dev

      - name: Build assets (production)
        run: npm run production
